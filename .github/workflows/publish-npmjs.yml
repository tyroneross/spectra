name: Publish @tyroneross/spectra to npmjs

on:
  release:
    types: [published]
  workflow_dispatch:
    inputs:
      dry_run:
        description: "Run npm publish --dry-run instead of publishing"
        required: false
        default: "true"

permissions:
  contents: read
  id-token: write

jobs:
  verify-manifests:
    uses: tyroneross/RossLabs-AI-Toolkit/.github/workflows/verify-plugin-manifests.yml@plugin-ci-v1

  publish:
    needs: verify-manifests
    runs-on: macos-latest
    steps:
      - uses: actions/checkout@v6

      - uses: actions/setup-node@v6
        with:
          node-version: "24.x"
          registry-url: "https://registry.npmjs.org"
          package-manager-cache: false

      - name: Verify release tag matches package.json version
        if: github.event_name == 'release'
        run: |
          PKG_VERSION=$(node -p "require('./package.json').version")
          TAG="${GITHUB_REF_NAME#v}"
          if [ "$PKG_VERSION" != "$TAG" ]; then
            echo "::error::package.json version ($PKG_VERSION) does not match release tag ($TAG)"
            exit 1
          fi

      - name: Install deps
        run: npm ci --ignore-scripts

      - name: Build
        run: npm run build

      - name: Test
        run: npm test

      - name: Verify package contents
        run: npm pack --dry-run --registry https://registry.npmjs.org

      - name: Publish dry run
        if: github.event_name == 'workflow_dispatch' && github.event.inputs.dry_run == 'true'
        run: npm publish --dry-run --provenance --access public --registry https://registry.npmjs.org
        env:
          NODE_AUTH_TOKEN: ${{ secrets.NPM_TOKEN }}

      - name: Publish to npmjs with provenance
        if: github.event_name == 'release' || (github.event_name == 'workflow_dispatch' && github.event.inputs.dry_run != 'true')
        run: npm publish --provenance --access public --registry https://registry.npmjs.org
        env:
          NODE_AUTH_TOKEN: ${{ secrets.NPM_TOKEN }}

      - name: Verify npmjs provenance metadata
        if: github.event_name == 'release' || (github.event_name == 'workflow_dispatch' && github.event.inputs.dry_run != 'true')
        run: |
          PKG=$(node -p "require('./package.json').name")
          VER=$(node -p "require('./package.json').version")
          for attempt in $(seq 1 30); do
            PREDICATE=$(npm view "$PKG@$VER" dist.attestations.provenance.predicateType --json --registry https://registry.npmjs.org 2>/dev/null | tr -d '"')
            if [ "$PREDICATE" = "https://slsa.dev/provenance/v1" ]; then
              echo "Verified provenance predicate: $PREDICATE"
              exit 0
            fi
            echo "Waiting for provenance metadata (attempt $attempt): ${PREDICATE:-missing}"
            sleep 15
          done
          echo "::error::Provenance predicate missing or unexpected for $PKG@$VER"
          exit 1
