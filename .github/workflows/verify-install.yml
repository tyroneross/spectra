name: Verify @tyroneross/spectra install

on:
  workflow_run:
    workflows: ["Publish @tyroneross/spectra to GitHub Packages"]
    types: [completed]
  workflow_dispatch:
    inputs:
      version:
        description: "Version to verify (omit to use current package.json)"
        required: false
        default: ""

permissions:
  contents: read
  packages: read

jobs:
  verify:
    runs-on: ubuntu-latest
    if: github.event_name != 'workflow_run' || github.event.workflow_run.conclusion == 'success'
    steps:
      - uses: actions/checkout@v6

      - name: Resolve version
        id: ver
        run: |
          if [ -n "${{ inputs.version }}" ]; then
            V="${{ inputs.version }}"
          else
            V=$(node -p "require('./package.json').version")
          fi
          echo "version=$V" >> "$GITHUB_OUTPUT"

      - uses: actions/setup-node@v6
        with:
          node-version: "24.x"
          registry-url: "https://npm.pkg.github.com"
          scope: "@tyroneross"
          package-manager-cache: false

      - name: Wait for propagation
        if: github.event_name == 'workflow_run'
        run: sleep 45

      - name: Sandbox install
        env:
          NODE_AUTH_TOKEN: ${{ secrets.GITHUB_TOKEN }}
        run: |
          set -euo pipefail
          mkdir -p /tmp/verify && cd /tmp/verify
          npm init -y >/dev/null
          # --ignore-scripts skips Spectra's postinstall (Mac-only dist mirror).
          # We're on Linux runners, so it would no-op anyway, but explicit.
          npm install --ignore-scripts "@tyroneross/spectra@${{ steps.ver.outputs.version }}"

          INSTALLED=$(jq -r .version node_modules/@tyroneross/spectra/package.json)
          if [ "$INSTALLED" != "${{ steps.ver.outputs.version }}" ]; then
            echo "::error::version drift: installed=$INSTALLED requested=${{ steps.ver.outputs.version }}"
            exit 1
          fi

          # Plugin and runtime entrypoints both need to ship.
          for required in dist/index.js dist/index.d.ts bin/spectra .claude-plugin/plugin.json .codex-plugin/plugin.json commands skills; do
            if [ ! -e "node_modules/@tyroneross/spectra/$required" ]; then
              echo "::error::Missing from installed package: $required"
              exit 1
            fi
          done

          # Smoke import proves the package loads under the release Node runtime.
          node -e "import('@tyroneross/spectra').then(m => { console.log('imported:', Object.keys(m).slice(0, 5)); }).catch(e => { console.error('import failed:', e.message); process.exit(1); });"

          FILE_COUNT=$(find node_modules/@tyroneross/spectra -type f | wc -l | tr -d ' ')
          echo "::notice::Verified @tyroneross/spectra@$INSTALLED — $FILE_COUNT files installed, ESM import succeeded"
